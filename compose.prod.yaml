services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    container_name: teddy-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.prod.Dockerfile
    container_name: teddy-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
      - PUBLIC_BACKEND_URL=
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--eval",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.28.3-alpine
    container_name: teddy-nginx
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${CERTIFICATE_FILE}:/etc/ssl/certs/teddy.crt:ro
      - ${CERTIFICATE_KEY_FILE}:/etc/ssl/private/teddy.key:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
